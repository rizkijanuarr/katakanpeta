<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KatakanPeta</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #6b6b6b;
      --border: #e0e0e0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 64px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 400;
      font-size: 1.6rem;
      color: var(--black);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-right a.signin {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--black);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .nav-right a.signin:hover { opacity: 0.6; }

    .btn-primary {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      border-radius: 4px;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-primary:hover {
      background: #222;
      transform: translateY(-1px);
    }

    /* HERO */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 32px 100px;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 400;
      font-size: clamp(3.5rem, 9vw, 6.5rem);
      line-height: 1.0;
      letter-spacing: 1px;
      max-width: 820px;
      margin-bottom: 28px;
      color: var(--black);
    }

    .subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--gray);
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .btn-cta {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      padding: 16px 40px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      border-radius: 4px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn-cta:hover {
      background: #222;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      color: var(--gray);
    }

    footer a {
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--black); }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      nav { padding: 20px 24px; }
      h1 { letter-spacing: -1px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a class="logo" href="#">KatakanPeta</a>
    <div class="nav-right">
      <a class="signin" href="#">Sign in</a>
      <a class="btn-primary" href="#">Get Started</a>
    </div>
  </nav>

  <!-- HERO -->
  <main>
    <h1>Cari data klien seharga esteh di warung!</h1>
    <p class="subtitle">
      KatakanPeta membantu kamu menemukan ratusan calon klien dari Google Maps secara otomatis.
    </p>
    <a class="btn-cta" href="#">Mulai Sekarang</a>
  </main>

  <!-- FOOTER -->
  <footer>
    Crafted by <a href="https://www.rzkjanuarr.com" target="_blank">www.rzkjanuarr.com</a>
  </footer>

</body>
</html>
